<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Softsync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin/css/admin-styles.css">
</head>
<body class="dashboard-theme">
    <div class="login-container">
        <div class="card login-card">
            <div class="brand" style="justify-content: center;">
                <img src="assets/images/logo-s.png" alt="Logo">
                <h2>Softsync Admin</h2>
            </div>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Sign in to manage your business data.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="admin@softsyncsolutions.in" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Unlock Access</button>
                <div id="error-msg" style="color: var(--danger); font-size: 0.85rem; margin-top: 1rem; display: none;"></div>
            </form>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        import { SUPABASE_CONFIG } from './admin/js/config.js';

        const supabase = createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);

        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            errorMsg.style.display = 'none';

            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password,
            });

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } else {
                window.location.href = 'admin-dashboard.html';
            }
        });

        // Redirect if already logged in
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            window.location.href = 'admin-dashboard.html';
        }
    </script>
</body>
</html>
