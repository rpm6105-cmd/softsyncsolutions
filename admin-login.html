<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Softsync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-glow: rgba(16, 185, 129, 0.15);
            --bg: #030712;
            --surface: #070d1a;
            --surface-2: #0b1120;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.12);
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --text-dim: #334155;
            --danger: #ef4444;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Ambient background ── */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
        }
        .bg-orb-1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, transparent 70%);
            top: -120px; left: -120px;
            animation: drift1 18s ease-in-out infinite;
        }
        .bg-orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
            bottom: -80px; right: -80px;
            animation: drift2 22s ease-in-out infinite;
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
            background-size: 48px 48px;
            z-index: 0;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
        }

        @keyframes drift1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, 30px) scale(1.05); }
            66% { transform: translate(-20px, 50px) scale(0.97); }
        }
        @keyframes drift2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, -40px) scale(1.08); }
        }

        /* ── Card ── */
        .login-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
            animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border-bright);
            border-radius: 20px;
            padding: 2.5rem 2.25rem;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 32px 64px rgba(0,0,0,0.5),
                0 0 80px rgba(16,185,129,0.04);
            backdrop-filter: blur(12px);
        }

        /* ── Brand ── */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(16,185,129,0.05));
            border: 1px solid rgba(16,185,129,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .brand-icon img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .brand-icon-fallback {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary);
        }

        .brand-text h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .brand-text span {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        /* ── Heading ── */
        .login-heading {
            margin-bottom: 0.5rem;
        }

        .login-heading h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text-main);
        }

        .login-heading p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.35rem;
            line-height: 1.5;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 1.5rem 0;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 1.1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 14px;
            pointer-events: none;
            transition: color 0.2s;
        }

        .form-input {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border-bright);
            border-radius: 10px;
            padding: 0.75rem 0.9rem 0.75rem 2.6rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input::placeholder { color: var(--text-dim); }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .form-input:focus + .input-icon,
        .input-wrap:focus-within .input-icon {
            color: var(--primary);
        }

        /* Icon inside goes before input in DOM but styled with sibling trick */
        .input-wrap .input-icon { z-index: 1; }

        /* ── Toggle password ── */
        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 13px;
            padding: 4px;
            transition: color 0.2s;
        }
        .toggle-pw:hover { color: var(--text-muted); }

        /* ── Submit button ── */
        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0.8rem 1.25rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            margin-top: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 8px 24px rgba(16,185,129,0.3);
        }

        .btn-primary:active { transform: scale(0.99); }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary .btn-text { transition: opacity 0.2s; }
        .btn-primary.loading .btn-text { opacity: 0; }

        .spinner {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn-primary.loading .spinner { display: block; }

        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* ── Error ── */
        .error-msg {
            display: none;
            align-items: center;
            gap: 8px;
            margin-top: 1rem;
            padding: 0.7rem 0.9rem;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 8px;
            color: #fca5a5;
            font-size: 0.82rem;
            line-height: 1.4;
        }
        .error-msg.visible { display: flex; }

        /* ── Footer ── */
        .card-footer {
            margin-top: 1.75rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--primary);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }

        .card-footer span {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-grid"></div>

    <div class="login-wrap">
        <div class="login-card">

            <!-- Brand -->
            <div class="brand">
                <div class="brand-icon" id="brand-icon">
                    <img src="assets/images/company-logo-icon.svg" alt="Softsync Logo"
                         style="filter: brightness(0) invert(1);"
                         onerror="this.style.display='none'; document.getElementById('brand-fallback').style.display='flex';">
                    <span class="brand-icon-fallback" id="brand-fallback" style="display:none;">S</span>
                </div>
                <div class="brand-text">
                    <h1>Softsync</h1>
                    <span>Admin Portal</span>
                </div>
            </div>

            <!-- Heading -->
            <div class="login-heading">
                <h2>Welcome back</h2>
                <p>Sign in to manage your business data.</p>
            </div>

            <div class="divider"></div>

            <!-- Form -->
            <form id="login-form" novalidate>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrap">
                        <input
                            type="email"
                            id="email"
                            class="form-input"
                            placeholder="admin@softsyncsolutions.in"
                            autocomplete="email"
                            required>
                        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            required>
                        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password">
                            <svg id="eye-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">
                    <span class="btn-text">Unlock Access</span>
                    <div class="spinner"></div>
                </button>

                <div class="error-msg" id="error-msg">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span id="error-text"></span>
                </div>
            </form>

            <!-- Footer -->
            <div class="card-footer">
                <div class="status-dot"></div>
                <span>Secured · softsyncsolutions.in</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        import { SUPABASE_CONFIG } from './admin/js/config.js';

        const supabase = createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey, {
            auth: {
                persistSession: true,
                storage: window.sessionStorage,
                autoRefreshToken: true
            }
        });

        const form = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');
        const errorText = document.getElementById('error-text');

        // Toggle password visibility
        document.getElementById('toggle-pw').addEventListener('click', () => {
            const pw = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
            } else {
                pw.type = 'password';
                icon.innerHTML = `<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>`;
            }
        });

        function setLoading(on) {
            submitBtn.disabled = on;
            submitBtn.classList.toggle('loading', on);
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorMsg.classList.add('visible');
        }

        function hideError() {
            errorMsg.classList.remove('visible');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            setLoading(true);

            const formData = new FormData(form);
            const email = form.querySelector('#email').value.trim();
            const password = form.querySelector('#password').value;

            if (!email || !password) {
                showError('Please enter both email and password.');
                setLoading(false);
                return;
            }

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                showError(error.message);
                setLoading(false);
            } else {
                window.location.href = 'admin-dashboard.html';
            }
        });

        // Redirect if already logged in
        const { data: { session } } = await supabase.auth.getSession();
        if (session) window.location.href = 'admin-dashboard.html';
    </script>
</body>
</html>
