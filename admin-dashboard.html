<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Suite | Softsync Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin/css/admin-styles.css?v=2">
</head>
<body class="dashboard-theme">
    <div class="admin-layout" id="app-layout" style="display: none;">
        <aside class="sidebar">
            <div class="brand">
                <img src="assets/images/logo-s.png" alt="Logo">
                <h2>Softsync Admin</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-view="suite">🛠️ Business Suite</a>
                <a href="#" class="nav-item" data-view="history">📜 Document History</a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-ghost" style="width: 100%; color: var(--danger); border-color: transparent;">Sign Out</button>
            </div>
        </aside>

        <main class="main-content">
            <!-- Professional Suite View -->
            <section id="view-suite" class="view-section active">
                <header>
                    <h1>Softsync Business Suite</h1>
                    <div style="display: flex; gap: 1rem;">
                        <select id="suite-mode" class="form-input" style="width: auto;" onchange="updateUI()">
                            <option value="quotation">New Quotation</option>
                            <option value="proposal">New Project Proposal</option>
                            <option value="invoice">New Tax Invoice</option>
                            <option value="letterhead">New Letterhead</option>
                        </select>
                        <button class="btn btn-primary" onclick="saveDocument()">💾 Save & Sync</button>
                        <button class="btn btn-ghost" onclick="window.print()">🖨️ Print PDF</button>
                    </div>
                </header>

                <div class="split-layout">
                    <!-- Column 1: Editor -->
                    <div class="editor-pane">
                        <div class="card">
                            <h3 style="margin-bottom: 1.5rem; font-family: 'Outfit';">Client Details</h3>
                            <div class="form-group">
                                <label>Client Name / Company</label>
                                <input type="text" id="doc-client" class="form-input" placeholder="Enter Client Name..." oninput="renderLive()">
                            </div>
                            <div class="form-group">
                                <label>Project / Subject Summary</label>
                                <textarea id="doc-subject" class="form-input" style="height: 60px;" placeholder="What is this document about?..." oninput="renderLive()"></textarea>
                            </div>
                            <div id="date-field" class="form-group">
                                <label>Date / Due Date</label>
                                <input type="date" id="doc-date" class="form-input" oninput="renderLive()">
                            </div>
                            <div class="form-group">
                                <label>Client Address</label>
                                <textarea id="doc-client-address" class="form-input" style="height: 60px;" placeholder="Full Address of the client..." oninput="renderLive()"></textarea>
                            </div>
                            <div class="form-group">
                                <label>Client Phone</label>
                                <input type="text" id="doc-client-phone" class="form-input" placeholder="Client Phone Number..." oninput="renderLive()">
                            </div>
                            </div>
                        </div>

                        <!-- Proposal Specific Fields -->
                        <div class="card" id="proposal-editor" style="display: none;">
                            <h3 style="margin-bottom: 1.5rem; font-family: 'Outfit';">Project Structure</h3>
                            <div class="form-group">
                                <label>Scope of Work</label>
                                <textarea id="p-scope" class="form-input" style="height: 100px;" oninput="renderLive()" placeholder="Describe the project boundaries..."></textarea>
                            </div>
                            <div class="form-group">
                                <label>Deliverables</label>
                                <textarea id="p-deliverables" class="form-input" style="height: 80px;" oninput="renderLive()" placeholder="List what the client will receive..."></textarea>
                            </div>
                            <div class="form-group">
                                <label>Project Cost (INR)</label>
                                <input type="number" id="p-cost" class="form-input" oninput="renderLive()">
                            </div>
                            <div class="form-group">
                                <label>Timeline</label>
                                <input type="text" id="p-timeline" class="form-input" oninput="renderLive()" placeholder="e.g. 4 Weeks / Q3 Delivery">
                            </div>
                            <div class="form-group">
                                <label>Payment Terms</label>
                                <textarea id="p-payment" class="form-input" style="height: 60px;" oninput="renderLive()" placeholder="e.g. 50% advance..."></textarea>
                            </div>
                            <div class="form-group">
                                <label>Internal/Client Notes</label>
                                <textarea id="p-notes" class="form-input" style="height: 60px;" oninput="renderLive()"></textarea>
                            </div>
                        </div>

                        <div class="card" id="items-editor">
                            <h3 style="margin-bottom: 1.5rem; font-family: 'Outfit';">Line Items</h3>
                            <div id="line-items-container">
                                <!-- Dynamic Rows Here -->
                            </div>
                            <button class="btn btn-ghost" style="width: 100%; border-style: dashed;" onclick="addLineItem()">+ Add Item</button>
                        </div>
                    </div>

                    <!-- Column 2: Preview -->
                    <div class="preview-pane">
                        <div id="document-preview" class="a4-page theme-cyan">
                            <!-- Branded Template Renders Here -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- History View -->
            <section id="view-history" class="view-section">
                <header><h1>Document History</h1></header>
                <div class="card">
                    <table>
                        <thead><tr><th>Type</th><th>Client</th><th>Amount</th><th>Date</th><th>Action</th></tr></thead>
                        <tbody id="history-list"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="admin/js/admin-app.js?v=2"></script>
</body>
</html>
