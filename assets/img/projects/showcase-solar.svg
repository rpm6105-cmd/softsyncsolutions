<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Solar proposal engine mockup</title>
  <desc id="desc">A polished proposal dashboard showing solar system sizing, ROI, savings, and PDF generation workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1408"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1250" cy="160" r="260" fill="#f59e0b" opacity=".18"/>
  <rect x="110" y="82" width="1380" height="736" rx="38" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="110" y="82" width="1380" height="86" rx="38" fill="#24180d"/>
  <circle cx="156" cy="126" r="11" fill="#ef4444"/>
  <circle cx="191" cy="126" r="11" fill="#f59e0b"/>
  <circle cx="226" cy="126" r="11" fill="#22c55e"/>
  <text x="286" y="136" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Solar Proposal Engine</text>
  <text x="1188" y="136" fill="#fbbf24" font-family="Inter, Arial, sans-serif" font-size="18">Proposal draft 04</text>
  <text x="170" y="248" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">ROI &amp; Proposal Builder</text>
  <text x="170" y="286" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">From site inputs to financial projections and client-ready PDFs.</text>
  <rect x="170" y="338" width="430" height="414" rx="32" fill="#172033"/>
  <text x="210" y="390" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">System inputs</text>
  <g font-family="Inter, Arial, sans-serif" font-size="18">
    <text x="210" y="454" fill="#94a3b8">Monthly bill</text>
    <rect x="380" y="426" width="170" height="46" rx="14" fill="#0f172a"/>
    <text x="410" y="456" fill="#f8fafc">INR 2.4L</text>
    <text x="210" y="522" fill="#94a3b8">Rooftop area</text>
    <rect x="380" y="494" width="170" height="46" rx="14" fill="#0f172a"/>
    <text x="410" y="524" fill="#f8fafc">18,500 sq ft</text>
    <text x="210" y="590" fill="#94a3b8">System size</text>
    <rect x="380" y="562" width="170" height="46" rx="14" fill="#0f172a"/>
    <text x="410" y="592" fill="#f8fafc">210 kW</text>
    <text x="210" y="658" fill="#94a3b8">Tariff</text>
    <rect x="380" y="630" width="170" height="46" rx="14" fill="#0f172a"/>
    <text x="410" y="660" fill="#f8fafc">8.25 / kWh</text>
  </g>
  <rect x="640" y="338" width="800" height="414" rx="32" fill="#172033"/>
  <text x="684" y="390" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Financial model</text>
  <g>
    <rect x="704" y="650" width="68" height="46" rx="12" fill="url(#sun)"/>
    <rect x="802" y="608" width="68" height="88" rx="12" fill="url(#sun)"/>
    <rect x="900" y="558" width="68" height="138" rx="12" fill="url(#sun)"/>
    <rect x="998" y="512" width="68" height="184" rx="12" fill="url(#sun)"/>
    <rect x="1096" y="470" width="68" height="226" rx="12" fill="url(#sun)"/>
    <rect x="1194" y="426" width="68" height="270" rx="12" fill="url(#sun)"/>
    <line x1="704" x2="1290" y1="696" y2="696" stroke="#334155" stroke-width="3"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="684" y="430" width="220" height="104" rx="22" fill="#0f172a"/>
    <text x="716" y="471" fill="#94a3b8" font-size="17">Payback</text>
    <text x="716" y="512" fill="#fff" font-size="35" font-weight="800">3.8 yrs</text>
    <rect x="930" y="430" width="220" height="104" rx="22" fill="#0f172a"/>
    <text x="962" y="471" fill="#94a3b8" font-size="17">Annual savings</text>
    <text x="962" y="512" fill="#fff" font-size="35" font-weight="800">32.4L</text>
    <rect x="1176" y="430" width="220" height="104" rx="22" fill="#0f172a"/>
    <text x="1208" y="471" fill="#94a3b8" font-size="17">PDF ready</text>
    <text x="1208" y="512" fill="#22c55e" font-size="35" font-weight="800">Yes</text>
  </g>
</svg>
