<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Compliance tracker dashboard mockup</title>
  <desc id="desc">An anonymized compliance system showing due dates, risk status, documents, and alerts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="190" r="260" fill="#7c3aed" opacity=".2"/>
  <circle cx="190" cy="760" r="280" fill="#38bdf8" opacity=".12"/>
  <rect x="110" y="82" width="1380" height="736" rx="38" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="110" y="82" width="1380" height="86" rx="38" fill="#1e1b4b"/>
  <circle cx="156" cy="126" r="11" fill="#ef4444"/>
  <circle cx="191" cy="126" r="11" fill="#f59e0b"/>
  <circle cx="226" cy="126" r="11" fill="#22c55e"/>
  <text x="286" y="136" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">ComplianceOS</text>
  <text x="1245" y="136" fill="#c4b5fd" font-family="Inter, Arial, sans-serif" font-size="18">200+ client filings</text>
  <text x="160" y="248" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">Deadline &amp; Risk Monitor</text>
  <text x="160" y="286" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">Statutory alerts, document collection, and audit trails in one view.</text>
  <rect x="160" y="340" width="310" height="150" rx="28" fill="#172033"/>
  <text x="196" y="390" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Due this week</text>
  <text x="196" y="447" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800">37</text>
  <rect x="505" y="340" width="310" height="150" rx="28" fill="#172033"/>
  <text x="541" y="390" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">High risk items</text>
  <text x="541" y="447" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800">09</text>
  <rect x="850" y="340" width="310" height="150" rx="28" fill="#172033"/>
  <text x="886" y="390" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Documents pending</text>
  <text x="886" y="447" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800">126</text>
  <rect x="1195" y="340" width="245" height="150" rx="28" fill="#172033"/>
  <text x="1231" y="390" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">On-time rate</text>
  <text x="1231" y="447" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800">100%</text>
  <rect x="160" y="540" width="1280" height="212" rx="30" fill="#172033"/>
  <text x="204" y="594" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800">Compliance tracker</text>
  <g font-family="Inter, Arial, sans-serif" font-size="18">
    <text x="204" y="642" fill="#64748b">Client</text>
    <text x="520" y="642" fill="#64748b">Filing</text>
    <text x="820" y="642" fill="#64748b">Due date</text>
    <text x="1040" y="642" fill="#64748b">Status</text>
    <line x1="204" x2="1390" y1="662" y2="662" stroke="#263244"/>
    <text x="204" y="704" fill="#f8fafc">Client A</text>
    <text x="520" y="704" fill="#cbd5e1">PF monthly return</text>
    <text x="820" y="704" fill="#cbd5e1">Apr 15</text>
    <rect x="1040" y="678" width="118" height="36" rx="18" fill="#f59e0b" opacity=".18"/>
    <text x="1065" y="702" fill="#fbbf24">Review</text>
    <text x="204" y="748" fill="#f8fafc">Client B</text>
    <text x="520" y="748" fill="#cbd5e1">TDS challan</text>
    <text x="820" y="748" fill="#cbd5e1">Apr 22</text>
    <rect x="1040" y="722" width="118" height="36" rx="18" fill="#22c55e" opacity=".18"/>
    <text x="1065" y="746" fill="#86efac">Ready</text>
  </g>
</svg>
