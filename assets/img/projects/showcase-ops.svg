<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Operations center dashboard mockup</title>
  <desc id="desc">A unified operations dashboard showing inventory, assignments, service queues, and activity logs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#2a163b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1300" cy="180" r="260" fill="#7c3aed" opacity=".2"/>
  <rect x="110" y="82" width="1380" height="736" rx="38" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="110" y="82" width="1380" height="86" rx="38" fill="#211632"/>
  <circle cx="156" cy="126" r="11" fill="#ef4444"/>
  <circle cx="191" cy="126" r="11" fill="#f59e0b"/>
  <circle cx="226" cy="126" r="11" fill="#22c55e"/>
  <text x="286" y="136" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Operations Center</text>
  <text x="1160" y="136" fill="#c4b5fd" font-family="Inter, Arial, sans-serif" font-size="18">Inventory + service teams</text>
  <text x="164" y="244" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">Unified Ops Workspace</text>
  <text x="164" y="282" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">Stock, people, and service requests coordinated from one live board.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="164" y="334" width="285" height="134" rx="28" fill="#172033"/>
    <text x="202" y="382" fill="#94a3b8" font-size="18">Open service jobs</text>
    <text x="202" y="434" fill="#fff" font-size="44" font-weight="800">84</text>
    <rect x="484" y="334" width="285" height="134" rx="28" fill="#172033"/>
    <text x="522" y="382" fill="#94a3b8" font-size="18">Stock accuracy</text>
    <text x="522" y="434" fill="#fff" font-size="44" font-weight="800">98.2%</text>
    <rect x="804" y="334" width="285" height="134" rx="28" fill="#172033"/>
    <text x="842" y="382" fill="#94a3b8" font-size="18">Team utilization</text>
    <text x="842" y="434" fill="#fff" font-size="44" font-weight="800">76%</text>
    <rect x="1124" y="334" width="316" height="134" rx="28" fill="#172033"/>
    <text x="1162" y="382" fill="#94a3b8" font-size="18">Coordination gain</text>
    <text x="1162" y="434" fill="#fff" font-size="44" font-weight="800">+40%</text>
  </g>
  <rect x="164" y="512" width="760" height="240" rx="32" fill="#172033"/>
  <text x="206" y="565" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Assignment board</text>
  <g font-family="Inter, Arial, sans-serif" font-size="18">
    <text x="206" y="622" fill="#f8fafc">Packing bay reorder</text>
    <rect x="650" y="594" width="128" height="38" rx="19" fill="#38bdf8" opacity=".2"/>
    <text x="680" y="619" fill="#7dd3fc">In progress</text>
    <text x="206" y="676" fill="#f8fafc">Service kit dispatch</text>
    <rect x="650" y="648" width="128" height="38" rx="19" fill="#22c55e" opacity=".18"/>
    <text x="690" y="673" fill="#86efac">Ready</text>
    <text x="206" y="730" fill="#f8fafc">Low-stock exception</text>
    <rect x="650" y="702" width="128" height="38" rx="19" fill="#f59e0b" opacity=".18"/>
    <text x="686" y="727" fill="#fbbf24">Review</text>
  </g>
  <rect x="964" y="512" width="476" height="240" rx="32" fill="#172033"/>
  <text x="1006" y="565" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Stock flow</text>
  <path d="M1018 692 C1080 610, 1140 725, 1204 640 S1346 626, 1392 570" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
  <g fill="url(#accent)">
    <circle cx="1018" cy="692" r="12"/>
    <circle cx="1204" cy="640" r="12"/>
    <circle cx="1392" cy="570" r="12"/>
  </g>
</svg>
